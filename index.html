<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>九宫格目标搜索实验 [PsychoPy]</title>
    <!-- 1. 替换为CDN加载的样式文件，不用本地lib -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/psychojs@2026.1.3/dist/psychojs-2026.1.3.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jquery-ui-dist@1.12.1/jquery-ui.min.css">

    <!-- 2. 引入JSZip库，用于解压resources.zip -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <!-- 外部库，用CDN加载 -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-ui-dist@1.12.1/jquery-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/preloadjs@1.0.1/lib/preloadjs.min.js"></script>
    <!-- 替换为CDN加载的PsychoJS库，不用本地lib -->
    <script src="https://cdn.jsdelivr.net/npm/psychojs@2026.1.3/dist/psychojs-2026.1.3.iife.js"></script>

    <script>
        // 自动解压resources.zip并映射文件路径
        async function initExperiment() {
            const response = await fetch('resources.zip');
            const blob = await response.blob();
            const zip = new JSZip();
            const zipContent = await zip.loadAsync(blob);

            // 把解压后的文件注册到全局，让实验能找到图片
            window.psychoFileMap = {};
            for (const [path, file] of Object.entries(zipContent.files)) {
                if (!file.dir) {
                    const fileBlob = await file.async('blob');
                    window.psychoFileMap[path] = URL.createObjectURL(fileBlob);
                }
            }

            // 加载并运行实验主程序
            const script = document.createElement('script');
            script.src = './九宫格目标搜索实验.js';
            script.type = 'module';
            document.body.appendChild(script);

            // 兼容旧浏览器
            const legacyScript = document.createElement('script');
            legacyScript.src = './九宫格目标搜索实验-legacy-browsers.js';
            legacyScript.nomodule = true;
            document.body.appendChild(legacyScript);
        }

        // 页面加载完成后自动执行
        window.addEventListener('load', initExperiment);
    </script>
</body>
</html>
